name: Tauri Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      tag: ${{ steps.check.outputs.tag }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version and tag
        id: check
        shell: bash
        run: |
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          TAG="tauri-v$VERSION"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG not found. Will release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  tag:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create and push tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.check.outputs.tag }}"
          git push origin "${{ needs.check.outputs.tag }}"

  build:
    needs: [check, tag]
    if: needs.check.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            updater_key: windows-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            updater_key: darwin-aarch64
          - os: macos-14
            target: x86_64-apple-darwin
            updater_key: darwin-x86_64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            updater_key: linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libasound2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Install Tauri CLI
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        working-directory: src-tauri
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Stage Windows artifacts
        if: runner.os == 'Windows'
        shell: bash
        working-directory: src-tauri/target/${{ matrix.target }}/release/bundle/nsis
        run: |
          TAG="${{ needs.check.outputs.tag }}"
          mkdir -p "$GITHUB_WORKSPACE/release-staging"
          EXE_FILE=$(ls *_x64-setup.exe)
          # Tauri's NSIS exe contains spaces; rename so the release URL has no encoded chars.
          SAFE_NAME="${EXE_FILE// /.}"
          if [ "$EXE_FILE" != "$SAFE_NAME" ]; then
            mv -- "$EXE_FILE" "$SAFE_NAME"
            mv -- "${EXE_FILE}.sig" "${SAFE_NAME}.sig"
          fi
          SIG=$(cat "${SAFE_NAME}.sig")
          URL="https://github.com/SirBepy/claude_usage_in_taskbar/releases/download/${TAG}/${SAFE_NAME}"
          cp "$SAFE_NAME" "$GITHUB_WORKSPACE/release-staging/"
          cp "${SAFE_NAME}.sig" "$GITHUB_WORKSPACE/release-staging/"
          jq -n --arg sig "$SIG" --arg url "$URL" \
            '{signature:$sig, url:$url}' \
            > "$GITHUB_WORKSPACE/release-staging/${{ matrix.updater_key }}.json"

      - name: Stage macOS artifacts
        if: runner.os == 'macOS'
        shell: bash
        working-directory: src-tauri/target/${{ matrix.target }}/release/bundle
        run: |
          TAG="${{ needs.check.outputs.tag }}"
          mkdir -p "$GITHUB_WORKSPACE/release-staging"
          # Updater artifact: .app.tar.gz + .sig (produced because createUpdaterArtifacts=true).
          APP_TGZ=$(ls macos/*.app.tar.gz | head -n 1)
          APP_TGZ_BASE=$(basename "$APP_TGZ")
          ARCH_BASE="${APP_TGZ_BASE%.app.tar.gz}_${{ matrix.target }}.app.tar.gz"
          SAFE_TGZ="${ARCH_BASE// /.}"
          cp "$APP_TGZ" "$GITHUB_WORKSPACE/release-staging/$SAFE_TGZ"
          cp "${APP_TGZ}.sig" "$GITHUB_WORKSPACE/release-staging/${SAFE_TGZ}.sig"
          SIG=$(cat "${APP_TGZ}.sig")
          URL="https://github.com/SirBepy/claude_usage_in_taskbar/releases/download/${TAG}/${SAFE_TGZ}"
          jq -n --arg sig "$SIG" --arg url "$URL" \
            '{signature:$sig, url:$url}' \
            > "$GITHUB_WORKSPACE/release-staging/${{ matrix.updater_key }}.json"
          # DMG for human downloads.
          DMG_FILE=$(ls dmg/*.dmg | head -n 1)
          DMG_BASE=$(basename "$DMG_FILE")
          ARCH_DMG="${DMG_BASE%.dmg}_${{ matrix.target }}.dmg"
          SAFE_DMG="${ARCH_DMG// /.}"
          cp "$DMG_FILE" "$GITHUB_WORKSPACE/release-staging/$SAFE_DMG"

      - name: Stage Linux artifacts
        if: runner.os == 'Linux'
        shell: bash
        working-directory: src-tauri/target/${{ matrix.target }}/release/bundle
        run: |
          TAG="${{ needs.check.outputs.tag }}"
          mkdir -p "$GITHUB_WORKSPACE/release-staging"
          # Updater artifact: .AppImage.tar.gz + .sig (produced because createUpdaterArtifacts=true).
          UPDATER=$(ls appimage/*.AppImage.tar.gz | head -n 1)
          UPDATER_BASE=$(basename "$UPDATER")
          SAFE_UPDATER="${UPDATER_BASE// /.}"
          cp "$UPDATER" "$GITHUB_WORKSPACE/release-staging/$SAFE_UPDATER"
          cp "${UPDATER}.sig" "$GITHUB_WORKSPACE/release-staging/${SAFE_UPDATER}.sig"
          SIG=$(cat "${UPDATER}.sig")
          URL="https://github.com/SirBepy/claude_usage_in_taskbar/releases/download/${TAG}/${SAFE_UPDATER}"
          jq -n --arg sig "$SIG" --arg url "$URL" \
            '{signature:$sig, url:$url}' \
            > "$GITHUB_WORKSPACE/release-staging/${{ matrix.updater_key }}.json"
          # AppImage for users who want a no-install run.
          APPIMG=$(ls appimage/*.AppImage | head -n 1)
          APPIMG_BASE=$(basename "$APPIMG")
          SAFE_APPIMG="${APPIMG_BASE// /.}"
          cp "$APPIMG" "$GITHUB_WORKSPACE/release-staging/$SAFE_APPIMG"
          # DEB for Debian/Ubuntu users.
          DEB=$(ls deb/*.deb | head -n 1)
          DEB_BASE=$(basename "$DEB")
          SAFE_DEB="${DEB_BASE// /.}"
          cp "$DEB" "$GITHUB_WORKSPACE/release-staging/$SAFE_DEB"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.updater_key }}
          path: release-staging/

  publish:
    needs: [check, tag, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: release-*
          merge-multiple: true

      - name: Generate latest.json
        shell: bash
        working-directory: artifacts
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          PLATFORMS="{}"
          for f in *.json; do
            KEY="${f%.json}"
            PLATFORMS=$(jq --arg k "$KEY" --slurpfile p "$f" \
              '. + {($k): $p[0]}' <<< "$PLATFORMS")
          done
          jq -n \
            --arg version "$VERSION" \
            --arg notes "Release $VERSION" \
            --arg pub_date "$DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version:$version, notes:$notes, pub_date:$pub_date, platforms:$platforms}' \
            > latest.json
          cat latest.json

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.exe
            artifacts/*.exe.sig
            artifacts/*.app.tar.gz
            artifacts/*.app.tar.gz.sig
            artifacts/*.dmg
            artifacts/*.deb
            artifacts/*.AppImage
            artifacts/*.AppImage.tar.gz
            artifacts/*.AppImage.tar.gz.sig
            artifacts/latest.json
          tag_name: ${{ needs.check.outputs.tag }}
          name: Tauri ${{ needs.check.outputs.tag }}
          draft: false
          make_latest: "true"
